        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = '✅ ' + message;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 5000);
        }

        function showNotification(message, duration = 3000) {
            const notification = document.getElementById('notification');
            const text = document.getElementById('notificationText');
            text.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), duration);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function autoTabCode(current, nextId) {
            if (current.value.length >= current.maxLength) {
                const next = document.getElementById(nextId);
                if (next) next.focus();
            }
        }

        function getCodeFromInputs(prefix) {
            const part1 = document.getElementById(prefix + '1').value.toUpperCase();
            const part2 = document.getElementById(prefix + '2').value.toUpperCase();
            const part3 = document.getElementById(prefix + '3').value.toUpperCase();
            return `${part1}-${part2}-${part3}`;
        }

        function clearCodeInputs(prefix) {
            document.getElementById(prefix + '1').value = '';
            document.getElementById(prefix + '2').value = '';
            document.getElementById(prefix + '3').value = '';
        }

        function generateRandomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            code += '-';
            for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            code += '-';
            for (let i = 0; i < 5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function toggleAuth(mode) {
            // Esconder todas as mensagens
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            if (mode === 'register') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('forgotPasswordForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            } else if (mode === 'forgot') {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('forgotPasswordForm').style.display = 'block';
            } else {
                // login
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('forgotPasswordForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
            }
        }

        function showForgotPassword() {
            toggleAuth('forgot');
        }

        async function sendPasswordReset() {
            const email = document.getElementById('forgotEmail').value.trim();
            
            if (!email) {
                showError('Digite seu email!');
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('Email de recuperação enviado! Verifique sua caixa de entrada.');
                setTimeout(() => toggleAuth('login'), 3000);
            } catch (error) {
                console.error('Erro ao enviar email:', error);
                if (error.code === 'auth/user-not-found') {
                    showError('Email não encontrado no sistema.');
                } else if (error.code === 'auth/invalid-email') {
                    showError('Email inválido.');
                } else {
                    showError('Erro ao enviar email: ' + error.message);
                }
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Preencha email e senha!');
                return;
            }
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                showSuccess('Login realizado com sucesso!');
                await loadUserData();
            } catch (error) {
                console.error('Erro no login:', error);
                if (error.code === 'auth/user-not-found') {
                    showError('Usuário não encontrado.');
                } else if (error.code === 'auth/wrong-password') {
                    showError('Senha incorreta.');
                } else if (error.code === 'auth/invalid-email') {
                    showError('Email inválido.');
                } else {
                    showError('Erro no login: ' + error.message);
                }
            }
        }

        async function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Validações
            if (!name || !email || !password || !confirmPassword) {
                showError('Preencha todos os campos!');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('As senhas não coincidem!');
                return;
            }
            
            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres!');
                return;
            }
            
            try {
                // Criar usuário no Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                currentUser = userCredential.user;
                
                // Verificar código de convite
                const code = getCodeFromInputs('code');
                let bonusData = {};
                
                if (code && VALID_CODES[code]) {
                    const codeData = VALID_CODES[code];
                    if (codeData.type === 'admin') {
                        bonusData = { 
                            isAdmin: true, 
                            level: codeData.level, 
                            points: codeData.points,
                            vip: codeData.vip
                        };
                    } else if (codeData.type === 'vip2') {
                        bonusData = { vip: 2 };
                    } else if (codeData.type === 'beta') {
                        bonusData = { 
                            achievements: ['Beta Tester'],
                            badges: ['beta']
                        };
                    }
                }
                
                // Criar documento no Firestore
                const newUserData = {
                    uid: currentUser.uid,
                    name: name,
                    email: email,
                    level: bonusData.level || 1,
                    xp: 0,
                    points: bonusData.points || 0,
                    vip: bonusData.vip || 0,
                    isAdmin: bonusData.isAdmin || false,
                    isTeacher: false,
                    teacherPending: false,
                    achievements: bonusData.achievements || [],
                    badges: bonusData.badges || [],
                    completedLessons: [],
                    streak: 0,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    inventory: [],
                    guild: null,
                    friends: [],
                    settings: { theme: 'dark', notifications: true }
                };
                
                await db.collection('users').doc(currentUser.uid).set(newUserData);
                
                showSuccess('Cadastro realizado! Bem-vindo ao NEURO 3.0!');
                await loadUserData();
                
            } catch (error) {
                console.error('Erro no cadastro:', error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('Este email já está cadastrado.');
                } else if (error.code === 'auth/invalid-email') {
                    showError('Email inválido.');
                } else if (error.code === 'auth/weak-password') {
                    showError('Senha muito fraca. Use pelo menos 6 caracteres.');
                } else {
                    showError('Erro no cadastro: ' + error.message);
                }
            }
        }

        async function logout() {

            showNotification('👋 Até logo!');

        async function loadUserData() {
            if (!currentUser) return;
            
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    userData = doc.data();
                    
                    // Atualizar UI
                    document.getElementById('userLevel').textContent = userData.level;
                    document.getElementById('userPoints').textContent = formatNumber(userData.points);
                    document.getElementById('welcomeName').textContent = userData.name;
                    document.getElementById('streakDays').textContent = userData.streak || 0;
                    document.getElementById('streakDisplay').textContent = userData.streak || 0;
                    
                    if (userData.vip >= 1) {
                        document.getElementById('userCrown').style.display = 'block';
                    }
                    
                    if (userData.isAdmin) {
                        document.getElementById('adminNav').style.display = 'block';
                    }
                    
                    document.getElementById('authContainer').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    
                    loadSubjects();
                }
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showError('Erro ao carregar dados do usuário.');
            }
        }

                await loadUserData();

                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('app').style.display = 'none';

                number: index + 1,
                title: topic === 'Aula' ? `${subject} - Aula ${index + 1}` : topic,

                content: generateLessonContent(subject, level, topic, index + 1),

        function playMemeMusic() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [440, 554, 659, 880, 440, 554, 659, 880];
                let currentNote = 0;
                
                function playNextNote() {
                    if (!isMemePlaying) return;
                    
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.frequency.value = notes[currentNote % notes.length];
                    osc.type = 'square';
                    
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                    
                    currentNote++;
                    if (isMemePlaying) setTimeout(playNextNote, 400);
                }
                
                playNextNote();
            } catch (e) {
                console.log('Áudio não suportado');
            }
        }

        function startQuiz() {
            if (!currentLesson || !currentLesson.quiz) {
                showError('Erro ao carregar quiz!');
                return;
            }
            
            quizData = currentLesson.quiz;
            currentQuestion = 0;
            correctAnswers = 0;
            
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('quizContainer').scrollIntoView({ behavior: 'smooth' });
            
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestion >= quizData.length) {
                finishQuiz();
                return;
            }
            
            const q = quizData[currentQuestion];
            document.getElementById('quizProgress').textContent = `Pergunta ${currentQuestion + 1} de ${quizData.length}`;
            document.getElementById('quizQuestion').textContent = q.question;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = opt;
                btn.onclick = () => answerQuestion(idx);
                optionsContainer.appendChild(btn);
            });
        }

        function answerQuestion(answerIdx) {
            const q = quizData[currentQuestion];
            const options = document.querySelectorAll('.quiz-option');
            
            options.forEach((opt, idx) => {
                opt.style.pointerEvents = 'none';
                if (idx === q.correct) opt.classList.add('correct');
                if (idx === answerIdx && idx !== q.correct) opt.classList.add('wrong');
            });
            
            if (answerIdx === q.correct) correctAnswers++;
            
            setTimeout(() => {
                currentQuestion++;
                showQuestion();
            }, 1500);
        }

        async function finishQuiz() {
            const percentage = (correctAnswers / quizData.length) * 100;
            const passed = percentage >= 60;
            
            if (passed) {
                showNotification(`🎉 Quiz completado! ${correctAnswers}/${quizData.length} (${percentage.toFixed(0)}%)`);
                
                const xpGain = 100 + (correctAnswers * 20);
                const pointsGain = 50 + (correctAnswers * 10);
                
                await updateUserProgress(xpGain, pointsGain);
                
                if (!userData.completedLessons.includes(currentLesson.id)) {
                    userData.completedLessons.push(currentLesson.id);
                    await db.collection('users').doc(currentUser.uid).update({
                        completedLessons: userData.completedLessons
                    });
                }
                
                createConfetti();
            } else {
                showNotification(`❌ Precisa de 60% para passar. Você fez ${percentage.toFixed(0)}%. Tente novamente!`);
            }
            
            document.getElementById('quizContainer').style.display = 'none';
        }

            const newXP = (userData.xp || 0) + xp;
            const newPoints = (userData.points || 0) + points;

            while (newXP >= newLevel * 1000) {

            await db.collection('users').doc(currentUser.uid).update({

            userData.points = newPoints;

            document.getElementById('profileEmail').textContent = userData.email;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function switchShopTab(tab) {
            document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            loadShop();
        }

        function createGuild() {
            showNotification('⚔️ Sistema de guildas em desenvolvimento!');
        }

        function joinGuild() {
            showNotification('🚪 Sistema de guildas em desenvolvimento!');
        }

        function buyItem(name, price) {
            if (!userData || userData.points < price) {
                showNotification('❌ Pontos insuficientes!');
                return;
            }
            showNotification(`✅ ${name} comprado!`);
        }
    </script>
</body>
</html>
