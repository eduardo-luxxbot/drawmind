    <script>
        // ==================== PARTE 3: SISTEMA AVANÇADO DE CÓDIGOS ====================

        const generatedCodes = [];
        let currentCodeType = 'item';

        function updateCodeForm() {
            const type = document.getElementById('codeType').value;
            currentCodeType = type;
            const label = document.getElementById('codeValueLabel');
            const input = document.getElementById('codeValue');
            
            const labels = {
                'item': 'ID do Item',
                'vip': 'Dias de VIP',
                'points': 'Quantidade de Pontos',
                'xp': 'Quantidade de XP',
                'teacher': 'Código Único (automático)',
                'admin': 'Código Único (automático)'
            };
            
            label.textContent = labels[type] || 'Valor';
            
            if(type === 'teacher' || type === 'admin') {
                input.disabled = true;
                input.placeholder = 'Gerado automaticamente';
            } else {
                input.disabled = false;
                input.placeholder = type === 'item' ? 'ex: vip_month' : 'ex: 1000';
            }
        }

        function generateCodes() {
            const type = document.getElementById('codeType').value;
            const quantity = parseInt(document.getElementById('codeQuantity').value) || 1;
            const expiry = parseInt(document.getElementById('codeExpiry').value) || 30;
            const value = document.getElementById('codeValue').value;
            
            const codes = [];
            const timestamp = Date.now();
            
            for(let i = 0; i < quantity; i++) {
                const code = generateUniqueCode(type);
                const codeData = {
                    code: code,
                    type: type,
                    value: value,
                    createdAt: timestamp,
                    expiresAt: timestamp + (expiry * 24 * 60 * 60 * 1000),
                    used: false,
                    usedBy: null,
                    usedAt: null
                };
                
                codes.push(codeData);
                generatedCodes.push(codeData);
            }
            
            displayGeneratedCodes(codes);
            showToast(`${quantity} código(s) gerado(s) com sucesso!`, 'success');
        }

        function generateUniqueCode(type) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            
            // Prefixo baseado no tipo
            const prefixes = {
                'item': 'ITM',
                'vip': 'VIP',
                'points': 'PTS',
                'xp': 'EXP',
                'teacher': 'TCH',
                'admin': 'ADM'
            };
            
            code += prefixes[type] || 'NEU';
            
            // Gerar 3 grupos de 4 caracteres
            for(let g = 0; g < 3; g++) {
                code += '-';
                for(let i = 0; i < 4; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
            }
            
            // Verificar se já existe (colisão improvável mas possível)
            if(generatedCodes.some(c => c.code === code)) {
                return generateUniqueCode(type);
            }
            
            return code;
        }

        function displayGeneratedCodes(codes) {
            const container = document.getElementById('generatedCodes');
            const list = document.getElementById('codesList');
            
            container.style.display = 'block';
            list.innerHTML = codes.map(c => `
                <div style="padding:0.5rem; border-bottom:1px solid rgba(255,255,255,0.1); font-family:monospace; font-size:1.1rem;">
                    <span style="color:var(--primary); font-weight:700;">${c.code}</span>
                    <span style="color:var(--gray); font-size:0.8rem; margin-left:1rem;">
                        ${c.type} • ${c.value || 'N/A'} • Expira em ${Math.floor((c.expiresAt - c.createdAt) / (1000 * 60 * 60 * 24))} dias
                    </span>
                </div>
            `).join('');
        }

        function copyCodes() {
            const codes = generatedCodes.slice(-parseInt(document.getElementById('codeQuantity').value));
            const text = codes.map(c => `${c.code} | ${c.type} | ${c.value || 'N/A'}`).join('\n');
